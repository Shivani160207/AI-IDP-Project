<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 45%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #1f2340;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 26px;
            overflow: hidden;
            box-shadow: 0 24px 50px rgba(38, 34, 89, 0.28);
            backdrop-filter: blur(10px);
        }

        .auth-header {
            background: linear-gradient(135deg, #5b7cff, #7c4dff, #ff6ec7);
            color: white;
            text-align: center;
            padding: 34px 24px;
        }

        .auth-header h2 {
            margin: 0 0 10px;
            font-size: 2rem;
        }

        .auth-header p {
            margin: 0;
            line-height: 1.6;
            opacity: 0.95;
        }

        .auth-body {
            padding: 28px 24px 30px;
        }

        .error-box {
            background: linear-gradient(135deg, #ffe4e6, #fff1f2);
            color: #b91c1c;
            padding: 12px 14px;
            margin-bottom: 18px;
            border-radius: 14px;
            border: 1px solid #fecdd3;
            font-weight: bold;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #4338ca;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid #d8dbff;
            background: #fbfbff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: #7c4dff;
            box-shadow: 0 0 0 4px rgba(124, 77, 255, 0.12);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #5b7cff, #8b5cf6);
            color: white;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 10px 22px rgba(91, 124, 255, 0.28);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(91, 124, 255, 0.35);
        }

        .footer-link {
            display: block;
            margin-top: 18px;
            text-align: center;
            color: #5b4dff;
            text-decoration: none;
            font-weight: bold;
        }

        .footer-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <h2>🔐 Welcome Back</h2>
            <p>Login to continue exploring your personalized AI-powered career recommendations.</p>
        </div>

        <div class="auth-body">
            {% if error %}
                <div class="error-box">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST">
                <div>
                    <label for="username">Username</label>
                    <input id="username" name="username" placeholder="Enter your username">
                </div>

                <div>
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="Enter your password">
                </div>

                <button type="submit">Login</button>
            </form>

            <a href="/signup" class="footer-link">Create new account</a>
        </div>
    </div>
</body>
</html>
